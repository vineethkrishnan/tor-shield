name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-format-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (shellcheck, shfmt, bats)
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt bats

      - name: Run shellcheck
        run: shellcheck *.sh

      - name: Check bash formatting
        run: shfmt -d -i 2 -ci *.sh

      - name: Run BATS functional tests
        run: bats tests/
